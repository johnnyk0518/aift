<!DOCTYPE html>
<html>
<head><title>공부 기록</title></head>
<body>
    <h2>공부 시간 기록</h2>
    <form action="/add" method="POST">
        <input type="date" name="date" required>
        <input type="text" name="subject" placeholder="과목" required>
        <input type="number" name="hours" step="0.1" placeholder="시간" required>
        <button type="submit">저장</button>
    </form>
</body>
</html>
